<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Manager - YouTube Transcript Copier</title>
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/icon16.png">
    <link rel="stylesheet" href="../css/themes/clean.css">
    <link rel="stylesheet" href="../css/themes/cyberpunk.css">
    <link rel="stylesheet" href="../css/common.css">
</head>
<body class="options-page">
    <!-- Cyberpunk effects -->
    <div class="noise"></div>
    <div class="scanline"></div>

    <div class="container">
        <!-- Settings Section -->
        <div class="settings-section">
            <div class="setting-group">
                <label data-i18n="options.settingsLanguageLabel">Language</label>
                <select id="langSelect">
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
            <div class="setting-group">
                <label data-i18n="options.settingsThemeLabel">Theme</label>
                <select id="themeSelect">
                    <option value="clean" data-i18n="options.themeClean">Clean Modern</option>
                    <option value="cyberpunk" data-i18n="options.themeCyberpunk">Cyberpunk</option>
                </select>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <h1 class="title" data-i18n="options.title">Prompt Manager</h1>
            <div class="header-buttons">
                <button id="addTemplate" class="btn-add" data-i18n="options.addButton">New</button>
                <button id="resetToDefault" class="btn-reset" data-i18n="options.resetButton">Reset</button>
                <button id="deleteAll" class="btn-delete-all" data-i18n="options.deleteAllButton">Delete All</button>
            </div>
        </div>

        <!-- Templates grid -->
        <div id="templatesContainer" class="templates-grid"></div>
    </div>

    <!-- Confirm dialog -->
    <div id="confirmDialog" class="dialog-overlay">
        <div class="dialog-box">
            <h2 id="dialogTitle" class="dialog-title">Confirm</h2>
            <p id="dialogMessage" class="dialog-message"></p>
            <div class="dialog-buttons">
                <button id="dialogCancel" class="dialog-btn dialog-btn-cancel" data-i18n="dialog.cancelButton">Cancel</button>
                <button id="dialogOk" class="dialog-btn dialog-btn-ok" data-i18n="dialog.okButton">OK</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="credit" style="padding: 24px 0;">
        &copy;2025 <a href="https://infohiroki.com/" target="_blank">
            <img src="../assets/logo.svg" alt="logo">info.HirokiTakamura
        </a>
    </div>

    <script type="module" src="options.js"></script>
</body>
</html>
