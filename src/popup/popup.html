<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Transcript Copier</title>
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/icon16.png">
    <link rel="stylesheet" href="../css/themes/clean.css">
    <link rel="stylesheet" href="../css/themes/cyberpunk.css">
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>
    <!-- Cyberpunk effects (hidden by default, shown via CSS when theme is cyberpunk) -->
    <div class="noise"></div>
    <div class="scanline"></div>

    <div class="container">
        <div class="header">
            <h1 class="title" data-i18n="popup.title">Transcript Copier</h1>
            <button id="manageTemplates" class="btn-settings" data-i18n-title="options.title">&#x2699;&#xFE0F;</button>
        </div>

        <select id="templateSelect" class="prompt-select">
            <option value="" data-i18n="popup.selectPlaceholder">Select Prompt</option>
        </select>

        <textarea id="promptTemplate" class="prompt-textarea" data-i18n-placeholder="popup.textareaPlaceholder"></textarea>
        <button id="copyTranscript" class="btn-primary" data-i18n="popup.copyButton">Copy</button>
    </div>

    <div class="credit">
        &copy;2025 <a href="https://infohiroki.com/" target="_blank">
            <img src="../assets/logo.svg" alt="logo">info.HirokiTakamura
        </a>
    </div>

    <!-- Alert overlay -->
    <div id="customAlert" class="alert-overlay">
        <div class="alert-box">
            <p id="alertMessage" class="alert-message" data-i18n="alert.copied">Copied!</p>
        </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">LOADING...</div>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
